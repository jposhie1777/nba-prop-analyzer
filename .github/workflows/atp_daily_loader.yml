name: ATP Daily Loader

on:
  schedule:
    - cron: "15 9 * * *"
  workflow_dispatch:
    inputs:
      year:
        description: "Optional target year override (YYYY)"
        required: false
        default: ""

jobs:
  daily-loader:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      ATP_DATASET: "atp_data"
      ATP_BQ_LOCATION: "US"
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/mobile_api

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt

      - name: Configure GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Apply ATP website DDL
        run: |
          python -m mobile_api.ingest.atp.apply_website_ddl

      - name: Run ATP daily website loader (append-only)
        run: |
          ARGS="--mode daily --sleep 0.2 --no-truncate-schedule"
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="$ARGS --start-year ${{ inputs.year }} --end-year ${{ inputs.year }}"
          fi
          python -m mobile_api.ingest.atp.website_ingest $ARGS

