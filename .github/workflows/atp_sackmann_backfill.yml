name: ATP Sackmann Backfill

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "Backfill start year (YYYY)"
        required: false
        default: "1968"
      end_year:
        description: "Backfill end year (YYYY)"
        required: false
        default: ""
      years:
        description: "Optional comma-separated years override (e.g. 2023,2024,2025)"
        required: false
        default: ""
      include_challenger:
        description: "Include qual/challenger files (true/false)"
        required: false
        default: "true"
      include_futures:
        description: "Include futures files (true/false)"
        required: false
        default: "false"
      truncate_raw:
        description: "Truncate raw table before load (true/false)"
        required: false
        default: "true"
      rebuild_features:
        description: "Rebuild derived stats tables after ingest (true/false)"
        required: false
        default: "true"

jobs:
  sackmann-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      ATP_DATASET: "atp_data"
      ATP_BQ_LOCATION: "US"
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/mobile_api

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt

      - name: Configure GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Run Sackmann backfill
        run: |
          END_YEAR="${{ inputs.end_year }}"
          if [ -z "$END_YEAR" ]; then
            END_YEAR=$(date +%Y)
          fi

          ARGS="--mode backfill --start-year ${{ inputs.start_year }} --end-year $END_YEAR"

          if [ -n "${{ inputs.years }}" ]; then
            ARGS="$ARGS --years ${{ inputs.years }}"
          fi
          if [ "${{ inputs.include_challenger }}" = "true" ]; then
            ARGS="$ARGS --include-challenger"
          else
            ARGS="$ARGS --no-include-challenger"
          fi
          if [ "${{ inputs.include_futures }}" = "true" ]; then
            ARGS="$ARGS --include-futures"
          else
            ARGS="$ARGS --no-include-futures"
          fi
          if [ "${{ inputs.truncate_raw }}" = "true" ]; then
            ARGS="$ARGS --truncate-raw"
          fi
          if [ "${{ inputs.rebuild_features }}" = "false" ]; then
            ARGS="$ARGS --no-rebuild-features"
          fi

          python -m mobile_api.ingest.atp.sackmann_ingest $ARGS
