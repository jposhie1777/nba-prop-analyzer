name: BQ Analytics Pipeline

on:
  schedule:
    - cron: '0 10 * * *'   # Daily at 10am UTC (6am ET)
  workflow_dispatch:        # Manual trigger anytime

jobs:
  run-mls-analytics:
    name: MLS Analytics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run MLS pipeline
        run: python scripts/run_bq_pipeline.py --league mls

  run-epl-analytics:
    name: EPL Analytics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-bigquery

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Run EPL pipeline
        run: python scripts/run_bq_pipeline.py --league epl