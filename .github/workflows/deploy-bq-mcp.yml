name: Deploy BQ MCP Server
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
 
env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  IMAGE_NAME: bq-mcp-server
  CLOUD_RUN_SERVICE: bq-mcp-server
  ARTIFACT_REGISTRY: ${{ secrets.GCP_REGION || 'us-central1' }}-docker.pkg.dev
 
jobs:
  # ---------------------------
  # BUILD & PUSH
  # ---------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
 
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
 
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet
 
      - name: Set image URI
        id: image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          URI="us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.IMAGE_NAME }}:$SHA"
          echo "uri=$URI" >> $GITHUB_OUTPUT
          echo "Image URI: $URI"
 
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.image.outputs.uri }} \
            -t us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.IMAGE_NAME }}:latest \
            ./mobile/bigquery_mcp_http
 
      - name: Push Docker image
        run: |
          docker push ${{ steps.image.outputs.uri }}
          docker push us-central1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/cloud-run-source-deploy/${{ env.IMAGE_NAME }}:latest
 
  # ---------------------------
  # DEPLOY
  # ---------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
 
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
 
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
 
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CLOUD_RUN_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          flags: --allow-unauthenticated
          env_vars: |
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            MCP_API_TOKEN=${{ secrets.MCP_API_TOKEN }}
 
  # ---------------------------
  # SMOKE TEST
  # ---------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
 
    steps:
      - name: Health check
        run: |
          URL="${{ needs.deploy.outputs.service_url }}"
          echo "Testing $URL/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Health check passed ✓"
 
      - name: MCP initialize handshake
        run: |
          URL="${{ needs.deploy.outputs.service_url }}"
          RESPONSE=$(curl -s -X POST "$URL/mcp" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.MCP_API_TOKEN }}" \
            -d '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{}}}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "protocolVersion" || { echo "Initialize handshake failed"; exit 1; }
          echo "Initialize handshake passed ✓"
 
      - name: MCP tools/list check
        run: |
          URL="${{ needs.deploy.outputs.service_url }}"
          RESPONSE=$(curl -s -X POST "$URL/mcp" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.MCP_API_TOKEN }}" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}')
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q "list_datasets" || { echo "tools/list check failed"; exit 1; }
          echo "tools/list check passed ✓"
 
  # ---------------------------
  # NOTIFY
  # ---------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, deploy, smoke-test]
    if: always()
 
    steps:
      - name: Determine status
        id: status
        run: |
          if [[ "${{ needs.build.result }}" == "success" && \
                "${{ needs.deploy.result }}" == "success" && \
                "${{ needs.smoke-test.result }}" == "success" ]]; then
            echo "result=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "message=BQ MCP Server deployed successfully" >> $GITHUB_OUTPUT
          else
            echo "result=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "message=BQ MCP Server deployment failed" >> $GITHUB_OUTPUT
          fi
 
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Push | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service URL | ${{ needs.deploy.outputs.service_url }} |" >> $GITHUB_STEP_SUMMARY