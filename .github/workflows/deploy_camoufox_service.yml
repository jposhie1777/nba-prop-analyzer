name: Deploy Camoufox Proxy Service

# Deploys the Camoufox Browser Proxy to Cloud Run.
# This service is used by the sportsbook scraper workflows to bypass
# TLS fingerprinting on FanDuel and DraftKings sportsbook APIs.
#
# Two modes:
#   1. workflow_dispatch — manual full rebuild (build + deploy + smoke test)
#   2. schedule — daily region rotation (deploy only, reuses latest image)
#
# CAMOUFOX_SERVICE_URL secret is updated automatically after every deploy.
# If smoke test fails, emergency redeploy fires to a backup region.

on:
  workflow_dispatch:
    inputs:
      min_instances:
        description: "Min instances (1 = always-on, recommended)"
        required: false
        default: "1"
      max_instances:
        description: "Max instances"
        required: false
        default: "2"
      force_region:
        description: "Force a specific region (leave blank to auto-rotate)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - us-central1
          - us-east1
          - us-west1
          - europe-west1
          - asia-east1
          - asia-northeast1
          - southamerica-east1

  schedule:
    # Rotate region daily at 5:00 AM EST (before sportsbook scraper at 6 AM)
    - cron: "0 10 * * *"

env:
  PROJECT_ID: graphite-flare-477419-h7
  IMAGE_NAME: camoufox-proxy
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev
  IMAGE_URI: us-central1-docker.pkg.dev/graphite-flare-477419-h7/cloud-run-source-deploy/camoufox-proxy:latest

jobs:
  # -----------------------------------------------------------------------
  # BUILD & PUSH (manual dispatch only — skipped on schedule)
  # -----------------------------------------------------------------------
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          token_format: access_token
          access_token_scopes: >-
            https://www.googleapis.com/auth/cloud-platform,
            https://www.googleapis.com/auth/devstorage.read_write

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set image URI
        id: image
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c1-7)
          URI="${{ env.ARTIFACT_REGISTRY }}/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.IMAGE_NAME }}:${SHA}"
          echo "uri=$URI" >> $GITHUB_OUTPUT
          echo "Image URI: $URI"

      - name: Build and push Docker image
        run: |
          docker build \
            --build-arg GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -t ${{ steps.image.outputs.uri }} \
            -t ${{ env.IMAGE_URI }} \
            ./camoufox_service
          docker push ${{ steps.image.outputs.uri }}
          docker push ${{ env.IMAGE_URI }}

  # -----------------------------------------------------------------------
  # DEPLOY
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    permissions:
      contents: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
      region: ${{ steps.region.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Select region
        id: region
        run: |
          FORCE="${{ inputs.force_region }}"
          if [ -n "$FORCE" ]; then
            REGION="$FORCE"
          else
            REGIONS=("us-east1" "us-west1" "europe-west1" "us-central1")
            IDX=$(( $(date +%j) % 4 ))
            REGION="${REGIONS[$IDX]}"
          fi
          echo "name=$REGION" >> $GITHUB_OUTPUT
          echo "Deploying to region: $REGION"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: camoufox-proxy
          region: ${{ steps.region.outputs.name }}
          image: ${{ env.IMAGE_URI }}
          flags: >-
            --no-allow-unauthenticated
            --min-instances=${{ inputs.min_instances || '1' }}
            --max-instances=${{ inputs.max_instances || '2' }}
            --memory=2Gi
            --cpu=2
            --timeout=300
            --concurrency=1
          env_vars: |
            GCP_PROJECT=${{ env.PROJECT_ID }}

      - name: Update CAMOUFOX_SERVICE_URL secret
        run: |
          echo "Updating CAMOUFOX_SERVICE_URL to: ${{ steps.deploy.outputs.url }}"
          gh secret set CAMOUFOX_SERVICE_URL --body "${{ steps.deploy.outputs.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # SMOKE TEST
  # -----------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      healthy: ${{ steps.health.outputs.healthy }}

    steps:
      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          token_format: id_token
          id_token_audience: ${{ needs.deploy.outputs.service_url }}

      - name: Health check
        id: health
        run: |
          URL="${{ needs.deploy.outputs.service_url }}"
          echo "Testing ${URL}/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.id_token }}" \
            "${URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "Health check passed (HTTP 200)"
          echo "healthy=true" >> $GITHUB_OUTPUT

  # -----------------------------------------------------------------------
  # EMERGENCY REDEPLOY
  # Fires if smoke test fails — picks a random backup region and redeploys
  # -----------------------------------------------------------------------
  emergency-redeploy:
    name: Emergency Redeploy
    runs-on: ubuntu-latest
    needs: [deploy, smoke-test]
    if: always() && needs.smoke-test.result == 'failure'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Select emergency region
        id: emergency_region
        run: |
          BACKUPS=("asia-east1" "asia-northeast1" "southamerica-east1")
          IDX=$(( RANDOM % 3 ))
          REGION="${BACKUPS[$IDX]}"
          echo "name=$REGION" >> $GITHUB_OUTPUT
          echo "Emergency deploying to: $REGION"

      - name: Emergency deploy to Cloud Run
        id: emergency_deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: camoufox-proxy
          region: ${{ steps.emergency_region.outputs.name }}
          image: ${{ env.IMAGE_URI }}
          flags: >-
            --no-allow-unauthenticated
            --min-instances=1
            --max-instances=2
            --memory=2Gi
            --cpu=2
            --timeout=300
            --concurrency=1
          env_vars: |
            GCP_PROJECT=${{ env.PROJECT_ID }}

      - name: Update CAMOUFOX_SERVICE_URL secret with emergency URL
        run: |
          echo "Emergency URL: ${{ steps.emergency_deploy.outputs.url }}"
          gh secret set CAMOUFOX_SERVICE_URL --body "${{ steps.emergency_deploy.outputs.url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log emergency redeploy warning
        run: |
          echo "::warning::Primary deploy failed. Emergency redeployed to ${{ steps.emergency_region.outputs.name }}. CAMOUFOX_SERVICE_URL updated automatically."

  # -----------------------------------------------------------------------
  # SUMMARY
  # -----------------------------------------------------------------------
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [build, deploy, smoke-test, emergency-redeploy]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Camoufox Proxy Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Emergency Redeploy | ${{ needs.emergency-redeploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ needs.deploy.outputs.region }}" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${{ needs.deploy.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CAMOUFOX_SERVICE_URL secret updated automatically." >> $GITHUB_STEP_SUMMARY
