name: Test H2H
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install camoufox[geoip] && python -m camoufox fetch --token ${{ secrets.GITHUB_TOKEN }}
      - run: python3 test_h2h.py