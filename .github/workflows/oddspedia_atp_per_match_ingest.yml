name: Oddspedia ATP Per-Match Ingest

on:
  workflow_dispatch:
    inputs:
      input_dir:
        description: "Path to match_specific capture files"
        required: false
        default: "website_responses/atp/match_specific"
      dry_run:
        description: "Dry run (parse + row counts only, no BigQuery writes)"
        required: false
        type: boolean
        default: false
  schedule:
    # Daily at 09:00 UTC
    - cron: "0 9 * * *"

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      ODDSPEDIA_DATASET: "oddspedia"
      ODDSPEDIA_TABLE: "atp_odds"
      ODDSPEDIA_BQ_LOCATION: "US"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt

      - name: Configure GCP credentials
        if: ${{ inputs.dry_run != true }}
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Run ATP per-match ingest
        run: |
          INPUT_DIR="${{ inputs.input_dir || 'website_responses/atp/match_specific' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m mobile_api.ingest.atp.oddspedia_atp_per_match_workflow \
              --input-dir "$INPUT_DIR" --dry-run
          else
            python -m mobile_api.ingest.atp.oddspedia_atp_per_match_workflow \
              --input-dir "$INPUT_DIR"
          fi
