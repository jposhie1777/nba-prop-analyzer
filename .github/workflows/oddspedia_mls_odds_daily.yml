name: Oddspedia MLS Live Odds Ingest

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scrape + print rows, no BigQuery writes)"
        required: false
        type: boolean
        default: false
      all_dates:
        description: "Include all dates on page (default: today only)"
        required: false
        type: boolean
        default: false
      url:
        description: "Override Oddspedia MLS URL (leave blank for default)"
        required: false
        default: ""
  schedule:
    - cron: "0 10 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      ODDSPEDIA_DATASET: "oddspedia"
      ODDSPEDIA_BQ_LOCATION: "US"
      ODDSPEDIA_MLS_TABLE: "mls_odds"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt

      - name: Install system dependencies for Camoufox/Firefox
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libgtk-3-0t64 libdbus-glib-1-2 libxt6t64 libx11-xcb1 \
            libxcomposite1 libxcursor1 libxdamage1 libxfixes3 \
            libxi6 libxrandr2 libxrender1 libxss1 libxtst6 \
            libasound2t64 libpangocairo-1.0-0 libatk1.0-0t64 \
            libcairo-gobject2 libgdk-pixbuf2.0-0

      - name: Install Camoufox + Firefox
        run: |
          pip install camoufox[geoip]
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} python -m camoufox fetch

      - name: Set URL override (if provided)
        if: ${{ inputs.url != '' }}
        run: echo "ODDSPEDIA_MLS_URL=${{ inputs.url }}" >> $GITHUB_ENV

      - name: Run scrape — odds
        run: |
          ARGS="--scrape-only"
          if [ "${{ inputs.all_dates }}" = "true" ]; then
            ARGS="$ARGS --all-dates"
          fi
          python -m mobile_api.ingest.mls.oddspedia_mls_odds_ingest $ARGS

      - name: Run scrape — match info
        run: |
          python -m mobile_api.ingest.mls.oddspedia_mls_match_info_ingest --scrape-only

      - name: Upload scrape artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mls-scrape-output
          path: /tmp/mls_scrape_*.ndjson
          retention-days: 1

  load:
    runs-on: ubuntu-latest
    needs: scrape
    if: ${{ inputs.dry_run != true }}
    timeout-minutes: 10

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      ODDSPEDIA_DATASET: "oddspedia"
      ODDSPEDIA_BQ_LOCATION: "US"
      ODDSPEDIA_MLS_TABLE: "mls_odds"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt

      - name: Configure GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Download scrape artifacts
        uses: actions/download-artifact@v4
        with:
          name: mls-scrape-output
          path: /tmp/

      - name: Load odds → BigQuery
        run: python -m mobile_api.ingest.mls.oddspedia_mls_odds_ingest --load-only

      - name: Load match info → BigQuery
        run: python -m mobile_api.ingest.mls.oddspedia_mls_match_info_ingest --load-only

      - name: Run H2H ingest
        run: python -m mobile_api.ingest.mls.oddspedia_mls_h2h_ingest
