name: PropFinder HR Pipeline

on:
  schedule:
    # All times in UTC. ET = UTC-4 (EDT) / UTC-5 (EST)
    # 6:00 AM ET  = 10:00 UTC (EDT) / 11:00 UTC (EST)
    # 12:00 PM ET = 16:00 UTC (EDT) / 17:00 UTC (EST)
    # 4:30 PM ET  = 20:30 UTC (EDT) / 21:30 UTC (EST)
    - cron: "0 10 * * *"    # 6:00 AM ET (EDT)
    - cron: "0 16 * * *"    # 12:00 PM ET (EDT)
    - cron: "30 20 * * *"   # 4:30 PM ET (EDT)
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  propfinder-pipeline:
    name: Ingest + Model
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: propfinder/requirements.txt

      - name: Install dependencies
        run: pip install -r propfinder/requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run ingest
        run: python propfinder/ingest.py
        env:
          GOOGLE_CLOUD_PROJECT: graphite-flare-477419-h7

      - name: Run model
        run: python propfinder/model.py
        env:
          GOOGLE_CLOUD_PROJECT: graphite-flare-477419-h7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: propfinder-logs-${{ github.run_id }}
          path: |
            propfinder/*.log
          retention-days: 7