name: PropFinder Pipeline (HR + K + Hits)

on:
  schedule:
    # All times in UTC. ET = UTC-4 (EDT) / UTC-5 (EST)
    - cron: "0 10 * * *"    # 6:00 AM ET
    - cron: "30 15 * * *"   # 11:30 AM ET
    - cron: "0 19 * * *"    # 3:00 PM ET
    - cron: "30 20 * * *"   # 4:30 PM ET
    - cron: "0 22 * * *"    # 6:00 PM ET
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  propfinder-pipeline:
    name: Ingest + Model
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      GOOGLE_CLOUD_PROJECT: graphite-flare-477419-h7

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: propfinder/requirements.txt

      - name: Install dependencies
        run: pip install -r propfinder/requirements.txt

      - name: Validate GCP credential secret
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ] && [ -z "${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}" ]; then
            echo "::error::Missing GCP credentials secret. Set one of: GCP_SA_KEY or GOOGLE_APPLICATION_CREDENTIALS_JSON"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Run PropFinder workflow
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_HR_WEBHOOK: ${{ secrets.DISCORD_HR_WEBHOOK }}
          DISCORD_HR_CHANNEL_ID: ${{ secrets.DISCORD_HR_CHANNEL_ID }}
          DISCORD_K_CHANNEL_ID: ${{ secrets.DISCORD_K_CHANNEL_ID }}
          DISCORD_HIT_CHANNEL_ID: ${{ secrets.DISCORD_HIT_CHANNEL_ID }}
        run: |
          python propfinder/run_workflow.py 2>&1 | tee propfinder/workflow.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: propfinder-logs-${{ github.run_id }}
          path: |
            propfinder/*.log
          retention-days: 7