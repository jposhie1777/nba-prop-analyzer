name: Sportsbook ATP Markets (FanDuel)

# Fetches ATP tennis market data (moneyline + deeper markets like set betting,
# game handicaps, totals) from FanDuel via the Camoufox Cloud Run proxy,
# then loads into BigQuery for analysis and deep-link generation.
#
# Prerequisites (GitHub Actions secrets):
#   GOOGLE_APPLICATION_CREDENTIALS_JSON  - GCP service account JSON
#   PROJECT_ID                           - GCP project ID
#   CAMOUFOX_SERVICE_URL                 - Cloud Run URL of the camoufox-proxy
#
# Table written:
#   sportsbook.raw_fanduel_atp_markets

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — scrape and print rows, skip BigQuery writes"
        required: false
        type: boolean
        default: false
  schedule:
    # 10:00 UTC daily (6am ET) — catches overnight ATP events in Europe
    - cron: "0 10 * * *"

env:
  GCP_PROJECT: ${{ secrets.PROJECT_ID }}

jobs:
  # -----------------------------------------------------------------------
  # SCRAPE — call the Camoufox proxy and save NDJSON artifact
  # -----------------------------------------------------------------------
  scrape:
    name: Scrape FanDuel ATP
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Authenticate to GCP (for identity token)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          token_format: id_token
          id_token_audience: ${{ secrets.CAMOUFOX_SERVICE_URL }}

      - name: Scrape FanDuel ATP markets
        env:
          CAMOUFOX_SERVICE_URL: ${{ secrets.CAMOUFOX_SERVICE_URL }}
          CAMOUFOX_TOKEN: ${{ steps.auth.outputs.id_token }}
        run: |
          ARGS="--scrape-only"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi

          # Retry up to 3 times with 30s backoff to handle transient 429s
          for attempt in 1 2 3; do
            echo "Scrape attempt $attempt of 3..."
            if python -m mobile_api.ingest.sportsbook.fanduel_atp_scraper $ARGS; then
              echo "Scrape succeeded on attempt $attempt."
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed. Waiting 30s before retry..."
              sleep 30
            else
              echo "All 3 attempts failed."
              exit 1
            fi
          done

      - name: Upload scrape artifact
        if: inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: fanduel-atp
          path: /tmp/fanduel_atp_rows.ndjson
          retention-days: 1

  # -----------------------------------------------------------------------
  # LOAD — insert NDJSON artifact into BigQuery
  # -----------------------------------------------------------------------
  load:
    name: Load FanDuel ATP → BigQuery
    runs-on: ubuntu-latest
    needs: scrape
    if: inputs.dry_run != true
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Configure GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: fanduel-atp
          path: /tmp

      - name: Check artifact is non-empty
        id: artifact_check
        run: |
          if [ -s "/tmp/fanduel_atp_rows.ndjson" ]; then
            echo "has_rows=true" >> $GITHUB_OUTPUT
          else
            echo "has_rows=false" >> $GITHUB_OUTPUT
            echo "Artifact is empty — nothing to load. Skipping BQ write."
          fi

      - name: Load FanDuel ATP → BigQuery
        if: steps.artifact_check.outputs.has_rows == 'true'
        env:
          GCP_PROJECT: ${{ secrets.PROJECT_ID }}
        run: |
          python -m mobile_api.ingest.sportsbook.fanduel_atp_scraper --load-only
