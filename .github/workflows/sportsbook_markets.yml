name: Sportsbook Markets (FanDuel + DraftKings)

# Scrapes betting markets from FanDuel and DraftKings via the Camoufox
# Cloud Run proxy, then loads results into BigQuery.
#
# Sports covered:
#   - PGA Tour        → sportsbook.raw_fanduel_pga_markets
#                     → sportsbook.raw_draftkings_pga_markets
#   - EPL (soccer)    → sportsbook.raw_fanduel_soccer_markets  (seasonal gate)
#   - MLS (soccer)    → sportsbook.raw_draftkings_soccer_markets (seasonal gate)
#
# Prerequisites (GitHub Actions secrets):
#   GOOGLE_APPLICATION_CREDENTIALS_JSON  - GCP service account JSON
#   PROJECT_ID                           - GCP project ID
#   CAMOUFOX_SERVICE_URL                 - Cloud Run URL of camoufox-proxy
#
# Architecture:
#   scrape job  → uploads NDJSON artifact (one per matrix cell)
#   load job    → downloads artifact, writes to BigQuery
#   max-parallel: 1 on scrape prevents concurrent proxy 429s

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Sport to scrape (PGA, EPL, MLS, or ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - ALL
          - PGA
          - EPL
          - MLS
      sportsbook:
        description: "Sportsbook (FanDuel, DraftKings, or ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - ALL
          - FanDuel
          - DraftKings
      dry_run:
        description: "Dry run — scrape and print rows, skip BigQuery writes"
        required: false
        type: boolean
        default: false
  schedule:
    # 6:00 AM EST daily — covers PGA morning lines + MLS/EPL evening windows
    - cron: "0 11 * * *"

env:
  GCP_PROJECT: ${{ secrets.PROJECT_ID }}
  BQ_DATASET: sportsbook
  BQ_LOCATION: US

jobs:
  # -------------------------------------------------------------------------
  # SCRAPE — call Camoufox proxy and save NDJSON artifacts
  # -------------------------------------------------------------------------
  scrape:
    name: Scrape ${{ matrix.sportsbook }} ${{ matrix.sport }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      # max-parallel: 1 — Camoufox proxy handles one browser session at a time.
      # Running matrix cells in parallel causes 429s on the cells that don't
      # get the first slot.
      max-parallel: 1
      matrix:
        include:
          # --- PGA Tour (active year-round during tour season) ---
          - sport: PGA
            sportsbook: FanDuel
            scraper_module: mobile_api.ingest.sportsbook.fanduel_pga_scraper
            artifact_name: fanduel-pga
            artifact_path: /tmp/fanduel_pga_rows.ndjson

          - sport: PGA
            sportsbook: DraftKings
            scraper_module: mobile_api.ingest.sportsbook.draftkings_pga_scraper
            artifact_name: draftkings-pga
            artifact_path: /tmp/draftkings_pga_rows.ndjson

          # --- EPL (seasonal gate handled inside scraper) ---
          - sport: EPL
            sportsbook: FanDuel
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
            artifact_path: /tmp/fanduel_epl_rows.ndjson

          - sport: EPL
            sportsbook: DraftKings
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-epl
            artifact_path: /tmp/draftkings_epl_rows.ndjson

          # --- MLS (seasonal gate handled inside scraper) ---
          - sport: MLS
            sportsbook: FanDuel
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
            artifact_path: /tmp/fanduel_mls_rows.ndjson

          - sport: MLS
            sportsbook: DraftKings
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-mls
            artifact_path: /tmp/draftkings_mls_rows.ndjson

    steps:
      # matrix.* is unavailable in job-level `if`; filter via early-exit step.
      - name: Check matrix filter
        id: filter
        run: |
          SKIP=false
          INPUT_SPORT="${{ github.event.inputs.sport }}"
          INPUT_SB="${{ github.event.inputs.sportsbook }}"
          if [ -n "$INPUT_SPORT" ] && [ "$INPUT_SPORT" != "ALL" ] && [ "$INPUT_SPORT" != "${{ matrix.sport }}" ]; then
            SKIP=true
          fi
          if [ -n "$INPUT_SB" ] && [ "$INPUT_SB" != "ALL" ] && [ "$INPUT_SB" != "${{ matrix.sportsbook }}" ]; then
            SKIP=true
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Authenticate to GCP (for identity token)
        if: steps.filter.outputs.skip != 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          token_format: id_token
          id_token_audience: ${{ secrets.CAMOUFOX_SERVICE_URL }}

      - name: Scrape ${{ matrix.sportsbook }} ${{ matrix.sport }}
        if: steps.filter.outputs.skip != 'true'
        env:
          CAMOUFOX_SERVICE_URL: ${{ secrets.CAMOUFOX_SERVICE_URL }}
          CAMOUFOX_TOKEN: ${{ steps.auth.outputs.id_token }}
        run: |
          # Soccer scrapers take --league; PGA scrapers don't need it
          if [ "${{ matrix.sport }}" = "PGA" ]; then
            ARGS="--scrape-only"
          else
            ARGS="--scrape-only --league ${{ matrix.sport }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            if [ "${{ matrix.sport }}" = "PGA" ]; then
              ARGS="--dry-run"
            else
              ARGS="--dry-run --league ${{ matrix.sport }}"
            fi
          fi

          # Retry up to 3 times with 30s backoff to handle transient 429s
          for attempt in 1 2 3; do
            echo "Scrape attempt $attempt of 3..."
            if python -m ${{ matrix.scraper_module }} $ARGS; then
              echo "Scrape succeeded on attempt $attempt."
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed. Waiting 30s before retry..."
              sleep 30
            else
              echo "All 3 attempts failed."
              exit 1
            fi
          done

      - name: Upload scrape artifact
        if: steps.filter.outputs.skip != 'true' && inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  # -------------------------------------------------------------------------
  # LOAD — insert NDJSON artifacts into BigQuery
  # -------------------------------------------------------------------------
  load:
    name: Load ${{ matrix.sportsbook }} ${{ matrix.sport }} → BigQuery
    runs-on: ubuntu-latest
    needs: scrape
    if: inputs.dry_run != true
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - sport: PGA
            sportsbook: FanDuel
            scraper_module: mobile_api.ingest.sportsbook.fanduel_pga_scraper
            artifact_name: fanduel-pga
            artifact_path: /tmp/fanduel_pga_rows.ndjson

          - sport: PGA
            sportsbook: DraftKings
            scraper_module: mobile_api.ingest.sportsbook.draftkings_pga_scraper
            artifact_name: draftkings-pga
            artifact_path: /tmp/draftkings_pga_rows.ndjson

          - sport: EPL
            sportsbook: FanDuel
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
            artifact_path: /tmp/fanduel_epl_rows.ndjson

          - sport: EPL
            sportsbook: DraftKings
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-epl
            artifact_path: /tmp/draftkings_epl_rows.ndjson

          - sport: MLS
            sportsbook: FanDuel
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
            artifact_path: /tmp/fanduel_mls_rows.ndjson

          - sport: MLS
            sportsbook: DraftKings
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-mls
            artifact_path: /tmp/draftkings_mls_rows.ndjson

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      BQ_DATASET: sportsbook
      BQ_LOCATION: US

    steps:
      - name: Check matrix filter
        id: filter
        run: |
          SKIP=false
          INPUT_SPORT="${{ github.event.inputs.sport }}"
          INPUT_SB="${{ github.event.inputs.sportsbook }}"
          if [ -n "$INPUT_SPORT" ] && [ "$INPUT_SPORT" != "ALL" ] && [ "$INPUT_SPORT" != "${{ matrix.sport }}" ]; then
            SKIP=true
          fi
          if [ -n "$INPUT_SB" ] && [ "$INPUT_SB" != "ALL" ] && [ "$INPUT_SB" != "${{ matrix.sportsbook }}" ]; then
            SKIP=true
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Configure GCP credentials
        if: steps.filter.outputs.skip != 'true'
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Download artifact
        if: steps.filter.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp

      - name: Check artifact is non-empty
        if: steps.filter.outputs.skip != 'true'
        id: artifact_check
        run: |
          if [ -s "${{ matrix.artifact_path }}" ]; then
            echo "has_rows=true" >> $GITHUB_OUTPUT
          else
            echo "has_rows=false" >> $GITHUB_OUTPUT
            echo "Artifact is empty — skipping BQ write."
          fi

      - name: Load ${{ matrix.sportsbook }} ${{ matrix.sport }} → BigQuery
        if: steps.filter.outputs.skip != 'true' && steps.artifact_check.outputs.has_rows == 'true'
        run: |
          if [ "${{ matrix.sport }}" = "PGA" ]; then
            python -m ${{ matrix.scraper_module }} --load-only
          else
            python -m ${{ matrix.scraper_module }} --load-only --league ${{ matrix.sport }}
          fi