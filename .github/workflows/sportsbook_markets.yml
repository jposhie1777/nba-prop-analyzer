name: Sportsbook Markets (FanDuel)

# Scrapes betting markets from FanDuel via the Camoufox Cloud Run proxy,
# then loads results into BigQuery.
#
# Sports covered:
#   - PGA Tour  → sportsbook.raw_fanduel_pga_markets
#   - ATP       → sportsbook.raw_fanduel_atp_markets
#   - EPL       → oddspedia.raw_fanduel_soccer_markets
#   - MLS       → oddspedia.raw_fanduel_soccer_markets
#
# Prerequisites (GitHub Actions secrets):
#   GOOGLE_APPLICATION_CREDENTIALS_JSON  - GCP service account JSON
#   PROJECT_ID                           - GCP project ID
#   CAMOUFOX_SERVICE_URL                 - Cloud Run URL of camoufox-proxy

on:
  workflow_dispatch:
    inputs:
      sport:
        description: "Sport to scrape (PGA, ATP, EPL, MLS, or ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - ALL
          - PGA
          - ATP
          - EPL
          - MLS
      dry_run:
        description: "Dry run — scrape and print rows, skip BigQuery writes"
        required: false
        type: boolean
        default: false
      discover:
        description: "Discovery mode — log all XHR URLs to identify capture patterns (PGA only)"
        required: false
        type: boolean
        default: false
  schedule:
    # 6:00 AM EST daily
    - cron: "0 11 * * *"

env:
  GCP_PROJECT: ${{ secrets.PROJECT_ID }}
  BQ_DATASET: sportsbook
  BQ_LOCATION: US

jobs:
  # -------------------------------------------------------------------------
  # SCRAPE
  # -------------------------------------------------------------------------
  scrape:
    name: Scrape FanDuel ${{ matrix.sport }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - sport: PGA
            scraper_module: mobile_api.ingest.sportsbook.fanduel_pga_scraper
            artifact_name: fanduel-pga
            artifact_path: /tmp/fanduel_pga_rows.ndjson

          - sport: ATP
            scraper_module: mobile_api.ingest.sportsbook.fanduel_atp_scraper
            artifact_name: fanduel-atp
            artifact_path: /tmp/fanduel_atp_rows.ndjson

          - sport: EPL
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
            artifact_path: /tmp/fanduel_epl_rows.ndjson

          - sport: MLS
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
            artifact_path: /tmp/fanduel_mls_rows.ndjson

    steps:
      - name: Check matrix filter
        id: filter
        run: |
          SKIP=false
          INPUT_SPORT="${{ github.event.inputs.sport }}"
          # Discovery mode only runs PGA scrapers
          if [ "${{ inputs.discover }}" = "true" ] && [ "${{ matrix.sport }}" != "PGA" ]; then
            SKIP=true
          fi
          if [ -n "$INPUT_SPORT" ] && [ "$INPUT_SPORT" != "ALL" ] && [ "$INPUT_SPORT" != "${{ matrix.sport }}" ]; then
            SKIP=true
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Authenticate to GCP (for identity token)
        if: steps.filter.outputs.skip != 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          token_format: id_token
          id_token_audience: ${{ secrets.CAMOUFOX_SERVICE_URL }}

      - name: Scrape FanDuel ${{ matrix.sport }}
        if: steps.filter.outputs.skip != 'true'
        env:
          CAMOUFOX_SERVICE_URL: ${{ secrets.CAMOUFOX_SERVICE_URL }}
          CAMOUFOX_TOKEN: ${{ steps.auth.outputs.id_token }}
        run: |
          # Build args
          # PGA and ATP do not take a --league flag
          if [ "${{ inputs.discover }}" = "true" ]; then
            ARGS="--discover"
          elif [ "${{ matrix.sport }}" = "PGA" ] || [ "${{ matrix.sport }}" = "ATP" ]; then
            ARGS="--scrape-only"
          else
            ARGS="--scrape-only --league ${{ matrix.sport }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ] && [ "${{ inputs.discover }}" != "true" ]; then
            if [ "${{ matrix.sport }}" = "PGA" ] || [ "${{ matrix.sport }}" = "ATP" ]; then
              ARGS="--dry-run"
            else
              ARGS="--dry-run --league ${{ matrix.sport }}"
            fi
          fi

          # Retry loop (skip for discover — it's just logging)
          if [ "${{ inputs.discover }}" = "true" ]; then
            python -m ${{ matrix.scraper_module }} $ARGS
          else
            for attempt in 1 2 3; do
              echo "Scrape attempt $attempt of 3..."
              if python -m ${{ matrix.scraper_module }} $ARGS; then
                echo "Scrape succeeded on attempt $attempt."
                break
              fi
              if [ $attempt -lt 3 ]; then
                echo "Attempt $attempt failed. Waiting 30s before retry..."
                sleep 30
              else
                echo "All 3 attempts failed."
                exit 1
              fi
            done
          fi

      - name: Upload scrape artifact
        if: steps.filter.outputs.skip != 'true' && inputs.dry_run != true && inputs.discover != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  # -------------------------------------------------------------------------
  # LOAD
  # -------------------------------------------------------------------------
  load:
    name: Load FanDuel ${{ matrix.sport }} → BigQuery
    runs-on: ubuntu-latest
    needs: scrape
    if: inputs.dry_run != true && inputs.discover != true
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - sport: PGA
            scraper_module: mobile_api.ingest.sportsbook.fanduel_pga_scraper
            artifact_name: fanduel-pga
            artifact_path: /tmp/fanduel_pga_rows.ndjson

          - sport: ATP
            scraper_module: mobile_api.ingest.sportsbook.fanduel_atp_scraper
            artifact_name: fanduel-atp
            artifact_path: /tmp/fanduel_atp_rows.ndjson

          - sport: EPL
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
            artifact_path: /tmp/fanduel_epl_rows.ndjson

          - sport: MLS
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
            artifact_path: /tmp/fanduel_mls_rows.ndjson

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      BQ_DATASET: sportsbook
      BQ_LOCATION: US

    steps:
      - name: Check matrix filter
        id: filter
        run: |
          SKIP=false
          INPUT_SPORT="${{ github.event.inputs.sport }}"
          if [ -n "$INPUT_SPORT" ] && [ "$INPUT_SPORT" != "ALL" ] && [ "$INPUT_SPORT" != "${{ matrix.sport }}" ]; then
            SKIP=true
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Configure GCP credentials
        if: steps.filter.outputs.skip != 'true'
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Download artifact
        if: steps.filter.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp

      - name: Check artifact is non-empty
        if: steps.filter.outputs.skip != 'true'
        id: artifact_check
        run: |
          if [ -s "${{ matrix.artifact_path }}" ]; then
            echo "has_rows=true" >> $GITHUB_OUTPUT
          else
            echo "has_rows=false" >> $GITHUB_OUTPUT
            echo "Artifact is empty — skipping BQ write."
          fi

      - name: Load FanDuel ${{ matrix.sport }} → BigQuery
        if: steps.filter.outputs.skip != 'true' && steps.artifact_check.outputs.has_rows == 'true'
        run: |
          # PGA and ATP do not take a --league flag
          if [ "${{ matrix.sport }}" = "PGA" ] || [ "${{ matrix.sport }}" = "ATP" ]; then
            python -m ${{ matrix.scraper_module }} --load-only
          else
            python -m ${{ matrix.scraper_module }} --load-only --league ${{ matrix.sport }}
          fi