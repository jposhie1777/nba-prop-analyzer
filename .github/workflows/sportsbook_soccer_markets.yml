name: Sportsbook Soccer Markets (FanDuel + DraftKings)

# Fetches EPL and MLS market IDs, selection IDs, and outcome codes from
# FanDuel and DraftKings via the Camoufox Cloud Run proxy, then loads them
# into BigQuery for use in deep-link generation on the EPL/MLS frontend.
#
# Prerequisites (GitHub Actions secrets):
#   GOOGLE_APPLICATION_CREDENTIALS_JSON  - GCP service account JSON
#   PROJECT_ID                           - GCP project ID
#   CAMOUFOX_SERVICE_URL                 - Cloud Run URL of the camoufox-proxy
#                                          service (set after first deploy)
#
# Tables written:
#   oddspedia.raw_fanduel_soccer_markets
#   oddspedia.raw_draftkings_soccer_markets
#
# Fixes (2026-03-28):
#   - max-parallel: 1 on scrape to prevent concurrent Camoufox proxy 429s
#   - Retry loop (3 attempts, 30s backoff) around each scrape call
#   - EPL break gate: skips EPL scrape jobs before EPL_RESUME_DATE
#   - Empty artifact guard: load step skips gracefully on empty file
#   - matrix.* is not available in job-level `if`; sportsbook/league
#     filtering is handled via an early-exit step instead

on:
  schedule:
    - cron: "0 11 * * *"  # 6am EST (UTC-5) / 7am EDT (UTC-4) daily
  workflow_dispatch:
    inputs:
      league:
        description: "League to scrape (EPL, MLS, or ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - ALL
          - EPL
          - MLS
      dry_run:
        description: "Dry run — scrape and print rows, skip BigQuery writes"
        required: false
        type: boolean
        default: false
      sportsbook:
        description: "Sportsbook (FanDuel, DraftKings, or ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - ALL
          - FanDuel
          - DraftKings
  schedule:
    # 5:00 AM EST daily (UTC-5), aligns with MLS + EPL Oddspedia windows
    - cron: "0 10 * * *"

env:
  GCP_PROJECT: ${{ secrets.PROJECT_ID }}
  ODDSPEDIA_DATASET: oddspedia
  ODDSPEDIA_BQ_LOCATION: US
  # Update this when EPL resumes. Format: YYYYMMDD
  EPL_RESUME_DATE: "20260410"

jobs:
  # -----------------------------------------------------------------------
  # SCRAPE — call the Camoufox proxy and save NDJSON artifacts
  # -----------------------------------------------------------------------
  scrape:
    name: Scrape ${{ matrix.sportsbook }} ${{ matrix.league }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      # max-parallel: 1 is critical — the Camoufox proxy only handles one
      # concurrent browser session. Running all 4 matrix jobs simultaneously
      # causes 429s on whichever jobs don't get the first slot.
      max-parallel: 1
      matrix:
        include:
          - sportsbook: FanDuel
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
            artifact_path: /tmp/fanduel_epl_rows.ndjson
          - sportsbook: FanDuel
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
            artifact_path: /tmp/fanduel_mls_rows.ndjson
          - sportsbook: DraftKings
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-epl
            artifact_path: /tmp/draftkings_epl_rows.ndjson
          - sportsbook: DraftKings
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-mls
            artifact_path: /tmp/draftkings_mls_rows.ndjson

    steps:
      # matrix.* is unavailable in job-level `if`, so we filter here instead.
      # Sets SKIP=true for cells that don't match the requested sportsbook/league,
      # which all subsequent steps check before running.
      - name: Check matrix filter
        id: filter
        run: |
          SKIP=false
          INPUT_SB="${{ github.event.inputs.sportsbook }}"
          INPUT_LG="${{ github.event.inputs.league }}"
          if [ -n "$INPUT_SB" ] && [ "$INPUT_SB" != "ALL" ] && [ "$INPUT_SB" != "${{ matrix.sportsbook }}" ]; then
            SKIP=true
          fi
          if [ -n "$INPUT_LG" ] && [ "$INPUT_LG" != "ALL" ] && [ "$INPUT_LG" != "${{ matrix.league }}" ]; then
            SKIP=true
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Authenticate to GCP (for identity token)
        if: steps.filter.outputs.skip != 'true'
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          token_format: id_token
          id_token_audience: ${{ secrets.CAMOUFOX_SERVICE_URL }}

      # Gate EPL jobs during the international break. Short-circuits before
      # hitting the proxy and writes an empty artifact so the load job
      # downstream doesn't fail trying to download a missing artifact.
      - name: Check EPL break gate
        if: steps.filter.outputs.skip != 'true' && matrix.league == 'EPL'
        run: |
          TODAY=$(date +%Y%m%d)
          if [ "$TODAY" -lt "${{ env.EPL_RESUME_DATE }}" ]; then
            echo "EPL is on break until ${{ env.EPL_RESUME_DATE }} (today: $TODAY). Writing empty artifact and skipping proxy call."
            touch ${{ matrix.artifact_path }}
            echo "EPL_ON_BREAK=true" >> $GITHUB_ENV
          else
            echo "EPL_ON_BREAK=false" >> $GITHUB_ENV
          fi

      - name: Scrape ${{ matrix.sportsbook }} ${{ matrix.league }}
        if: steps.filter.outputs.skip != 'true' && env.EPL_ON_BREAK != 'true'
        env:
          CAMOUFOX_SERVICE_URL: ${{ secrets.CAMOUFOX_SERVICE_URL }}
          CAMOUFOX_TOKEN: ${{ steps.auth.outputs.id_token }}
        run: |
          ARGS="--scrape-only --league ${{ matrix.league }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run --league ${{ matrix.league }}"
          fi

          # Retry up to 3 times with 30s backoff to handle transient 429s
          for attempt in 1 2 3; do
            echo "Scrape attempt $attempt of 3..."
            if python -m ${{ matrix.scraper_module }} $ARGS; then
              echo "Scrape succeeded on attempt $attempt."
              break
            fi
            if [ $attempt -lt 3 ]; then
              echo "Attempt $attempt failed. Waiting 30s before retry..."
              sleep 30
            else
              echo "All 3 attempts failed."
              exit 1
            fi
          done

      - name: Upload scrape artifact
        if: steps.filter.outputs.skip != 'true' && inputs.dry_run != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  # -----------------------------------------------------------------------
  # LOAD — insert NDJSON artifacts into BigQuery
  # -----------------------------------------------------------------------
  load:
    name: Load ${{ matrix.sportsbook }} ${{ matrix.league }} → BigQuery
    runs-on: ubuntu-latest
    needs: scrape
    if: inputs.dry_run != true
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        include:
          - sportsbook: FanDuel
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
            artifact_path: /tmp/fanduel_epl_rows.ndjson
          - sportsbook: FanDuel
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
            artifact_path: /tmp/fanduel_mls_rows.ndjson
          - sportsbook: DraftKings
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-epl
            artifact_path: /tmp/draftkings_epl_rows.ndjson
          - sportsbook: DraftKings
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-mls
            artifact_path: /tmp/draftkings_mls_rows.ndjson

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      ODDSPEDIA_DATASET: oddspedia
      ODDSPEDIA_BQ_LOCATION: US

    steps:
      # Same matrix filter pattern as scrape — matrix.* unavailable in job if
      - name: Check matrix filter
        id: filter
        run: |
          SKIP=false
          INPUT_SB="${{ github.event.inputs.sportsbook }}"
          INPUT_LG="${{ github.event.inputs.league }}"
          if [ -n "$INPUT_SB" ] && [ "$INPUT_SB" != "ALL" ] && [ "$INPUT_SB" != "${{ matrix.sportsbook }}" ]; then
            SKIP=true
          fi
          if [ -n "$INPUT_LG" ] && [ "$INPUT_LG" != "ALL" ] && [ "$INPUT_LG" != "${{ matrix.league }}" ]; then
            SKIP=true
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.filter.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.filter.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.filter.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Configure GCP credentials
        if: steps.filter.outputs.skip != 'true'
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Download artifact
        if: steps.filter.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp

      - name: Check artifact is non-empty
        if: steps.filter.outputs.skip != 'true'
        id: artifact_check
        run: |
          if [ -s "${{ matrix.artifact_path }}" ]; then
            echo "has_rows=true" >> $GITHUB_OUTPUT
          else
            echo "has_rows=false" >> $GITHUB_OUTPUT
            echo "Artifact ${{ matrix.artifact_path }} is empty — nothing to load. Skipping BQ write."
          fi

      - name: Load ${{ matrix.sportsbook }} ${{ matrix.league }} → BigQuery
        if: steps.filter.outputs.skip != 'true' && steps.artifact_check.outputs.has_rows == 'true'
        run: |
          python -m ${{ matrix.scraper_module }} --load-only --league ${{ matrix.league }}