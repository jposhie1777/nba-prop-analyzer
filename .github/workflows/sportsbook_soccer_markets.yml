name: Sportsbook Soccer Markets (FanDuel + DraftKings)

# Fetches EPL and MLS market IDs, selection IDs, and outcome codes from
# FanDuel and DraftKings via the Camoufox Cloud Run proxy, then loads them
# into BigQuery for use in deep-link generation on the EPL/MLS frontend.
#
# Prerequisites (GitHub Actions secrets):
#   GOOGLE_APPLICATION_CREDENTIALS_JSON  - GCP service account JSON
#   PROJECT_ID                           - GCP project ID
#   CAMOUFOX_SERVICE_URL                 - Cloud Run URL of the camoufox-proxy
#                                          service (set after first deploy)
#
# Tables written:
#   oddspedia.raw_fanduel_soccer_markets
#   oddspedia.raw_draftkings_soccer_markets

on:
  workflow_dispatch:
    inputs:
      league:
        description: "League to scrape (EPL, MLS, or ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - ALL
          - EPL
          - MLS
      dry_run:
        description: "Dry run — scrape and print rows, skip BigQuery writes"
        required: false
        type: boolean
        default: false
      sportsbook:
        description: "Sportsbook (FanDuel, DraftKings, or ALL)"
        required: false
        default: "ALL"
        type: choice
        options:
          - ALL
          - FanDuel
          - DraftKings
  schedule:
    # 5:00 AM EST daily (UTC-5), aligns with MLS + EPL Oddspedia windows
    - cron: "0 10 * * *"

env:
  GCP_PROJECT: ${{ secrets.PROJECT_ID }}
  ODDSPEDIA_DATASET: oddspedia
  ODDSPEDIA_BQ_LOCATION: US

jobs:
  # -----------------------------------------------------------------------
  # SCRAPE — call the Camoufox proxy and save NDJSON artifacts
  # -----------------------------------------------------------------------
  scrape:
    name: Scrape ${{ matrix.sportsbook }} ${{ matrix.league }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - sportsbook: FanDuel
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
            artifact_path: /tmp/fanduel_epl_rows.ndjson
          - sportsbook: FanDuel
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
            artifact_path: /tmp/fanduel_mls_rows.ndjson
          - sportsbook: DraftKings
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-epl
            artifact_path: /tmp/draftkings_epl_rows.ndjson
          - sportsbook: DraftKings
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-mls
            artifact_path: /tmp/draftkings_mls_rows.ndjson

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Authenticate to GCP (for identity token)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          token_format: id_token
          id_token_audience: ${{ secrets.CAMOUFOX_SERVICE_URL }}

      - name: Scrape ${{ matrix.sportsbook }} ${{ matrix.league }}
        env:
          CAMOUFOX_SERVICE_URL: ${{ secrets.CAMOUFOX_SERVICE_URL }}
          CAMOUFOX_TOKEN: ${{ steps.auth.outputs.id_token }}
        run: |
          ARGS="--scrape-only --league ${{ matrix.league }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run --league ${{ matrix.league }}"
          fi
          python -m ${{ matrix.scraper_module }} $ARGS

      - name: Upload scrape artifact
        if: ${{ inputs.dry_run != true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 1

  # -----------------------------------------------------------------------
  # LOAD — insert NDJSON artifacts into BigQuery
  # -----------------------------------------------------------------------
  load:
    name: Load ${{ matrix.sportsbook }} ${{ matrix.league }} → BigQuery
    runs-on: ubuntu-latest
    needs: scrape
    timeout-minutes: 10

    if: ${{ !inputs.dry_run }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - sportsbook: FanDuel
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-epl
          - sportsbook: FanDuel
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.fanduel_soccer_scraper
            artifact_name: fanduel-mls
          - sportsbook: DraftKings
            league: EPL
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-epl
          - sportsbook: DraftKings
            league: MLS
            scraper_module: mobile_api.ingest.sportsbook.draftkings_soccer_scraper
            artifact_name: draftkings-mls

    env:
      GCP_PROJECT: ${{ secrets.PROJECT_ID }}
      ODDSPEDIA_DATASET: oddspedia
      ODDSPEDIA_BQ_LOCATION: US

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r mobile_api/requirements.txt
          pip install requests

      - name: Configure GCP credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > gcp.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$(pwd)/gcp.json" >> $GITHUB_ENV

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: /tmp

      - name: Load ${{ matrix.sportsbook }} ${{ matrix.league }} → BigQuery
        run: |
          python -m ${{ matrix.scraper_module }} --load-only --league ${{ matrix.league }}
